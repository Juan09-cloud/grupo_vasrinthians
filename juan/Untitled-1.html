<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Corinthians Pizza 🖤🤍</title>

    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 40px;
        }

        input {
            padding: 10px;
            width: 220px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 10px 16px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #fff;
            color: #000;
            margin-left: 5px;
        }

        button:hover {
            background: #ddd;
        }

        #resposta {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Corinthians Pizza 🖤🤍</h1>

    <input type="text" id="sabor" placeholder="Qual o sabor da pizza?">
    <button onclick="fazerPedido()">Enviar Pedido</button>

    <p id="resposta"></p>

    <script>
        function fazerPedido() {
            const saborInput = document.getElementById("sabor");
            const resposta = document.getElementById("resposta");
            const sabor = saborInput.value.trim().toLowerCase();

            if (sabor === "") {
                resposta.innerText = "❗ Digite um sabor antes de enviar.";
                return;
            }

            const saboresDisponiveis = [
                "calabresa",
                "frango",
                "marguerita",
                "portuguesa",
                "quatro queijos",
                "pepperoni",
                "atum",
                "banana com canela"
            ];

            if (saboresDisponiveis.includes(sabor)) {
                resposta.innerText = "✅ Pedido aceito! 🍕🔥 Vai Corinthians!";
            } else {
                resposta.innerText = "❌ Sabor não encontrado no cardápio.";
            }

            saborInput.value = "";
        }
    </script>

</body>
</html>
